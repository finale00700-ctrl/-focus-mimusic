    <script>
      (function() {
        function makeButterflyIcon(size) {
          const c = document.createElement('canvas');
          c.width = c.height = size;
          const g = c.getContext('2d');
          const s = size / 200;

          // 배경 (둥근 사각형)
          const r = size * 0.22;
          g.beginPath();
          g.moveTo(r, 0); g.lineTo(size-r, 0);
          g.quadraticCurveTo(size, 0, size, r);
          g.lineTo(size, size-r);
          g.quadraticCurveTo(size, size, size-r, size);
          g.lineTo(r, size); g.quadraticCurveTo(0, size, 0, size-r);
          g.lineTo(0, r); g.quadraticCurveTo(0, 0, r, 0);
          g.closePath();
          const bg = g.createLinearGradient(0,0,size,size);
          bg.addColorStop(0, '#0a0118'); bg.addColorStop(0.5, '#1a0533');
          bg.addColorStop(1, '#0d1040');
          g.fillStyle = bg; g.fill();

          const cx = size/2, cy = size/2;

          function grad(type, x1p, y1p, r1p, stops) {
            let gr;
            if(type==='radial') {
              gr = g.createRadialGradient(cx+x1p*s, cy+y1p*s, 0, cx+x1p*s, cy+y1p*s, r1p*s);
            } else {
              gr = g.createLinearGradient(cx, cy-56*s, cx, cy+56*s);
            }
            stops.forEach(([p,c]) => gr.addColorStop(p,c));
            return gr;
          }

          // 왼쪽 상단 날개
          g.beginPath();
          g.moveTo(cx, cy-2*s);
          g.bezierCurveTo(cx, cy-35*s, cx-20*s, cy-80*s, cx-50*s, cy-76*s);
          g.bezierCurveTo(cx-72*s, cy-73*s, cx-84*s, cy-50*s, cx-80*s, cy-28*s);
          g.bezierCurveTo(cx-76*s, cy-8*s, cx-44*s, cy+4*s, cx, cy-2*s);
          g.closePath();
          const gLT = g.createRadialGradient(cx-20*s, cy-50*s, 0, cx-20*s, cy-50*s, 70*s);
          gLT.addColorStop(0,'rgba(230,180,255,0.95)'); gLT.addColorStop(0.4,'rgba(160,90,240,0.75)'); gLT.addColorStop(1,'rgba(60,10,120,0.2)');
          g.fillStyle = gLT; g.fill();

          // 왼쪽 하단 날개
          g.beginPath();
          g.moveTo(cx, cy+2*s);
          g.bezierCurveTo(cx, cy+28*s, cx-16*s, cy+65*s, cx-40*s, cy+70*s);
          g.bezierCurveTo(cx-62*s, cy+74*s, cx-82*s, cy+58*s, cx-80*s, cy+36*s);
          g.bezierCurveTo(cx-78*s, cy+16*s, cx-46*s, cy+6*s, cx, cy+2*s);
          g.closePath();
          const gLB = g.createRadialGradient(cx-25*s, cy+38*s, 0, cx-25*s, cy+38*s, 55*s);
          gLB.addColorStop(0,'rgba(200,150,255,0.85)'); gLB.addColorStop(1,'rgba(50,10,100,0.2)');
          g.fillStyle = gLB; g.fill();

          // 오른쪽 상단 날개
          g.beginPath();
          g.moveTo(cx, cy-2*s);
          g.bezierCurveTo(cx, cy-35*s, cx+20*s, cy-80*s, cx+50*s, cy-76*s);
          g.bezierCurveTo(cx+72*s, cy-73*s, cx+84*s, cy-50*s, cx+80*s, cy-28*s);
          g.bezierCurveTo(cx+76*s, cy-8*s, cx+44*s, cy+4*s, cx, cy-2*s);
          g.closePath();
          const gRT = g.createRadialGradient(cx+20*s, cy-50*s, 0, cx+20*s, cy-50*s, 70*s);
          gRT.addColorStop(0,'rgba(230,180,255,0.95)'); gRT.addColorStop(0.4,'rgba(160,90,240,0.75)'); gRT.addColorStop(1,'rgba(60,10,120,0.2)');
          g.fillStyle = gRT; g.fill();

          // 오른쪽 하단 날개
          g.beginPath();
          g.moveTo(cx, cy+2*s);
          g.bezierCurveTo(cx, cy+28*s, cx+16*s, cy+65*s, cx+40*s, cy+70*s);
          g.bezierCurveTo(cx+62*s, cy+74*s, cx+82*s, cy+58*s, cx+80*s, cy+36*s);
          g.bezierCurveTo(cx+78*s, cy+16*s, cx+46*s, cy+6*s, cx, cy+2*s);
          g.closePath();
          const gRB = g.createRadialGradient(cx+25*s, cy+38*s, 0, cx+25*s, cy+38*s, 55*s);
          gRB.addColorStop(0,'rgba(200,150,255,0.85)'); gRB.addColorStop(1,'rgba(50,10,100,0.2)');
          g.fillStyle = gRB; g.fill();

          // 반점
          [[cx-32*s,cy-42*s,8*s],[cx+32*s,cy-42*s,8*s],[cx-28*s,cy+38*s,6*s],[cx+28*s,cy+38*s,6*s]].forEach(([x,y,r])=>{
            g.beginPath(); g.arc(x,y,r,0,Math.PI*2);
            g.fillStyle='rgba(255,235,255,0.20)'; g.fill();
          });

          // 몸통
          g.save();
          g.translate(cx, cy);
          const bodyGr = g.createLinearGradient(0,-56*s,0,56*s);
          bodyGr.addColorStop(0,'rgba(240,200,255,0.97)'); bodyGr.addColorStop(1,'rgba(140,70,220,0.85)');
          g.scale(1,1); g.beginPath();
          g.ellipse(0,0,6*s,56*s,0,0,Math.PI*2);
          g.fillStyle=bodyGr; g.fill();
          // 머리
          g.beginPath(); g.ellipse(0,-58*s,5.5*s,8*s,0,0,Math.PI*2);
          g.fillStyle='rgba(240,200,255,0.95)'; g.fill();
          g.restore();

          // 더듬이
          g.strokeStyle='rgba(220,180,255,0.8)'; g.lineWidth=1.5*s; g.lineCap='round';
          g.beginPath(); g.moveTo(cx,cy-66*s); g.quadraticCurveTo(cx-10*s,cy-82*s,cx-18*s,cy-92*s); g.stroke();
          g.beginPath(); g.arc(cx-18*s,cy-92*s,3*s,0,Math.PI*2); g.fillStyle='rgba(240,200,255,0.9)'; g.fill();
          g.beginPath(); g.moveTo(cx,cy-66*s); g.quadraticCurveTo(cx+10*s,cy-82*s,cx+18*s,cy-92*s); g.stroke();
          g.beginPath(); g.arc(cx+18*s,cy-92*s,3*s,0,Math.PI*2); g.fillStyle='rgba(240,200,255,0.9)'; g.fill();

          return c.toDataURL('image/png');
        }

        // DOM 준비 후 link 태그 삽입
        function injectIcons() {
          const sizes = [180, 192, 512];
          sizes.forEach(sz => {
            const png = makeButterflyIcon(sz);
            const link = document.createElement('link');
            if(sz === 180) {
              link.rel = 'apple-touch-icon';
            } else {
              link.rel = 'icon';
              link.sizes = `${sz}x${sz}`;
            }
            link.type = 'image/png';
            link.href = png;
            document.head.appendChild(link);
          });

          // PWA manifest (바탕화면 아이콘 지원)
          const icon180 = makeButterflyIcon(180);
          const icon512 = makeButterflyIcon(512);
          const manifest = {
            name: '피아노 집중력 훈련',
            short_name: '피아노 집중',
            start_url: '.',
            display: 'standalone',
            background_color: '#0a0118',
            theme_color: '#1a0533',
            icons: [
              { src: icon180, sizes: '180x180', type: 'image/png' },
              { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
            ]
          };
          const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
          const mUrl = URL.createObjectURL(blob);
          const mLink = document.createElement('link');
          mLink.rel = 'manifest'; mLink.href = mUrl;
          document.head.appendChild(mLink);
        }

        if(document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', injectIcons);
        } else {
          injectIcons();
        }
      })();
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent; }

        html { height: 100%; }
        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(135deg, #0a0118, #1a0533, #0d1040, #0a0118);
            background-size: 400% 400%;
            animation: bgShift 12s ease infinite;
            color: white;

            overflow-y: auto;
            overscroll-behavior: none;

                     16px
                     max(16px, env(safe-area-inset-bottom, 16px));
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── 제목 ── */
        h1 {
            margin-top: auto;
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            font-weight: 300;
            letter-spacing: clamp(2px, 1vw, 5px);
            color: #e8d8ff;
            text-shadow: 0 0 24px rgba(200, 150, 255, 0.7);
            text-align: center;
        }

        .notice {
            font-size: clamp(0.72rem, 3vw, 0.85rem);
            color: #a78bca;
            letter-spacing: 1px;
            text-align: center;
        }

        .tag {
            font-size: clamp(0.6rem, 2.5vw, 0.72rem);
            color: #6b5a8a;
            letter-spacing: 1px;
            text-align: center;
        }

        /* ── 나비 애니메이션 ── */
        .ripple-wrap {
            position: relative;
            width: min(280px, 72vw, 38vh);
            height: min(280px, 72vw, 38vh);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        /* 대기: 날개가 천천히 펄럭 */
        .butterfly-svg {
            width: 82%;
            height: 82%;
            filter: drop-shadow(0 0 18px rgba(200, 140, 255, 0.45));
            animation: butterflyIdle 3.2s ease-in-out infinite;
        }
        @keyframes butterflyIdle {
            0%,100% { transform: scaleX(1)    rotate(0deg); filter: drop-shadow(0 0 14px rgba(200,140,255,0.4)); }
            25%     { transform: scaleX(0.55) rotate(-1deg); filter: drop-shadow(0 0 8px  rgba(180,120,255,0.25)); }
            75%     { transform: scaleX(0.55) rotate(1deg);  filter: drop-shadow(0 0 8px  rgba(180,120,255,0.25)); }
        }

        /* 훈련 중: 빠르고 강하게 펄럭 */
        body.running .butterfly-svg {
            animation: butterflyActive 1.1s ease-in-out infinite;
            filter: drop-shadow(0 0 28px rgba(220,160,255,0.75));
        }
        @keyframes butterflyActive {
            0%,100% { transform: scaleX(1)    translateY(0px);  filter: drop-shadow(0 0 28px rgba(220,160,255,0.75)); }
            25%     { transform: scaleX(0.28) translateY(-4px); filter: drop-shadow(0 0 12px rgba(190,130,255,0.4)); }
            75%     { transform: scaleX(0.28) translateY(4px);  filter: drop-shadow(0 0 12px rgba(190,130,255,0.4)); }
        }

        /* 가운데 음표 (숨김: 나비 몸통에 통합) */
        .ripple-center { display: none; }

        /* 물결 링 → 나비 뒤 후광으로 재활용 */
        .ripple-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(200, 160, 255, 0.15);
            animation: ripple 4s ease-out infinite;
            opacity: 0;
        }
        .ripple-ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
        .ripple-ring:nth-child(2) { width: 78%;  height: 78%;  animation-delay: 1s; }
        .ripple-ring:nth-child(3) { width: 56%;  height: 56%;  animation-delay: 2s; }
        .ripple-ring:nth-child(4) { width: 34%;  height: 34%;  animation-delay: 3s; }
        @keyframes ripple {
            0%   { opacity: 0;   transform: scale(0.75); }
            20%  { opacity: 0.5; }
            100% { opacity: 0;   transform: scale(1.1); }
        }
        body.running .ripple-ring {
            animation-duration: 2.2s;
            border-color: rgba(210, 160, 255, 0.4);
        }

        /* ── 주파수 바 ── */
        .freq-bar-wrap {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: clamp(24px, 5vh, 36px);
        }
        .freq-bar {
            width: clamp(4px, 1.2vw, 7px);
            border-radius: 3px;
            background: rgba(200, 150, 255, 0.6);
            animation: barBounce 0.09s ease-in-out infinite alternate;
        }
        .freq-bar:nth-child(1) { height: 45%;  animation-delay: 0ms; }
        .freq-bar:nth-child(2) { height: 90%;  animation-delay: 11ms; }
        .freq-bar:nth-child(3) { height: 65%;  animation-delay: 22ms; }
        .freq-bar:nth-child(4) { height: 100%; animation-delay: 33ms; }
        .freq-bar:nth-child(5) { height: 50%;  animation-delay: 44ms; }
        .freq-bar:nth-child(6) { height: 80%;  animation-delay: 55ms; }
        .freq-bar:nth-child(7) { height: 40%;  animation-delay: 66ms; }
        .freq-bar:nth-child(8) { height: 95%;  animation-delay: 77ms; }

        @keyframes barBounce {
            from { transform: scaleY(0.3); opacity: 0.3; }
            to   { transform: scaleY(1);   opacity: 1; }
        }
        .freq-bar-wrap.paused .freq-bar { animation-play-state: paused; }

        /* ── 타이머 ── */
        .timer-display {
            font-size: clamp(2.2rem, 9vw, 3rem);
            font-weight: 200;
            letter-spacing: clamp(3px, 1.5vw, 7px);
            color: #e8d8ff;
            text-shadow: 0 0 30px rgba(200, 150, 255, 0.4);
            font-variant-numeric: tabular-nums;
        }

        .status-text {
            font-size: clamp(0.75rem, 3vw, 0.95rem);
            color: #c0a0ff;
            letter-spacing: 1px;
            min-height: 22px;
            text-align: center;
            padding: 0 16px;
        }

        /* ── 진행 바 ── */
        .progress-wrap { width: min(240px, 80vw); }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: #8870b0;
            margin-bottom: 6px;
        }
        .progress-bg {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #6d28d9, #a855f7, #e879f9);
            border-radius: 3px;
            transition: width 1s linear;
        }

        /* ── 볼륨 조절 ── */
        .volume-wrap {
            display: flex; gap: 20px;
            margin-bottom: 10px;
            width: min(280px, 80vw);
            justify-content: center;
        }
        .volume-item {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .toggle-label {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.75rem; color: #a78bca;
            cursor: pointer;
        }
        .toggle-label input[type=checkbox] {
            accent-color: #a855f7;
            width: 14px; height: 14px;
            cursor: pointer;
        }
        .volume-item input[type=range] {
            width: clamp(80px, 25vw, 120px);
            accent-color: #a855f7;
        }

        /* ── 시간 선택 ── */
        .time-select-wrap { display: flex; gap: 10px; }
        .time-btn {
            padding: clamp(7px, 2vw, 9px) clamp(14px, 5vw, 20px);
            border-radius: 20px;
            border: 1px solid rgba(200, 170, 255, 0.3);
            background: transparent;
            color: #a78bca;
            font-size: clamp(0.78rem, 3vw, 0.88rem);
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            min-height: 40px;
        }
        .time-btn.active {
            background: rgba(124, 58, 237, 0.4);
            color: white;
            border-color: #a855f7;
        }
        .time-btn:disabled { pointer-events: none; opacity: 0.3; }

        /* ── 모드 선택 ── */
        .mode-wrap {
            display: flex; gap: 10px; margin-bottom: 5px; justify-content: center;
        }
        .mode-btn {
            padding: clamp(6px, 2vw, 8px) clamp(12px, 4vw, 16px);
            border-radius: 20px;
            border: 1px solid rgba(200, 170, 255, 0.3);
            background: transparent;
            color: #a78bca;
            font-size: clamp(0.7rem, 2.8vw, 0.8rem);
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: rgba(124, 58, 237, 0.4);
            color: white;
            border-color: #a855f7;
        }

        /* ── 버튼 ── */
        .btn-wrap { display: flex; gap: 14px; }
        .btn {
            padding: clamp(12px, 3.5vw, 15px) clamp(28px, 8vw, 38px);
            border: none; border-radius: 30px;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            cursor: pointer; transition: all 0.25s;
            letter-spacing: 1px;
            touch-action: manipulation;
            min-height: 50px;
            font-family: inherit;
        }
        .btn-start {
            background: linear-gradient(135deg, #6d28d9, #a855f7, #e879f9);
            color: white;
            box-shadow: 0 4px 24px rgba(168, 85, 247, 0.55);
        }
        .btn-start:active { transform: scale(0.97); }
        .btn-stop {
            background: rgba(255,255,255,0.08);
            color: #c4aeff;
            border: 1px solid rgba(200, 170, 255, 0.3);
            display: none;
        }
        .btn-stop:active { background: rgba(255,255,255,0.18); }

        /* ── 사용자 선택 ── */
        .user-wrap {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; font-size: 0.85rem; color: #e8d8ff;
        }
        .user-wrap input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(200, 170, 255, 0.3);
            border-radius: 15px; padding: 8px 12px;
            color: #fff; width: clamp(150px, 40vw, 200px); outline: none; transition: all 0.2s;
        }
        .user-wrap input:focus {
            border-color: #a855f7; background: rgba(255, 255, 255, 0.1);
        }
        .user-wrap input::placeholder { color: rgba(167, 139, 202, 0.5); }

        /* ── 훈련 기록 ── */
        .record-wrap {
            margin-top: 15px; margin-bottom: auto; width: min(300px, 90vw);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(200, 170, 255, 0.2);
            border-radius: 15px; padding: 12px; display: none;
        }
        .record-title {
            font-size: 0.8rem; color: #e8d8ff; text-align: center; margin-bottom: 6px; font-weight: 500;
        }
        .record-total {
            font-size: 0.7rem; color: #a78bca; text-align: center; margin-bottom: 10px;
        }
        .record-list {
            list-style: none; max-height: 100px; overflow-y: auto; padding-right: 5px;
        }
        .record-list::-webkit-scrollbar { width: 4px; }
        .record-list::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 2px; }
        .record-list li {
            display: flex; justify-content: space-between; font-size: 0.7rem; color: #c4aeff;
            padding: 4px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .record-list li:last-child { border-bottom: none; }

<script>
    // ── 상수 ─────────────────────────────────────────
    // 바이노럴 비트: 왼쪽 200Hz, 오른쪽 주파수는 모드에 따라 결정
    const BINAURAL_LEFT  = 200;
    let binauralDiff     = 14; // SMR(집중) 14Hz 기본값

    // 피아노 멜로디: C Major 코드들 (반복)
    // [주파수 배열] = 한 화음
    const PIANO_CHORDS = [
        [261.63, 329.63, 392.00],  // C4 E4 G4 (C Major)
        [293.66, 369.99, 440.00],  // D4 F#4 A4 (D Major)
        [261.63, 329.63, 392.00],  // C4 E4 G4
        [246.94, 311.13, 392.00],  // B3 Eb4 G4 (Bm)
        [220.00, 277.18, 329.63],  // A3 C#4 E4 (A Major)
        [261.63, 329.63, 392.00],  // C4 E4 G4
        [293.66, 369.99, 440.00],  // D4 F#4 A4
        [246.94, 311.13, 392.00],  // B3 Eb4 G4
    ];
    const CHORD_INTERVAL = 3.2;  // 초: 화음 바뀌는 주기

    // 완료 멜로디: C장조 상승 음계
    const FINISH_NOTES = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];

    // ── 상태 변수 ──────────────────────────────────────
    let audioCtx      = null;
    let mainPianoGain = null;
    let mainBinauralGain = null;
    let binauralLeft  = null, binauralRight  = null;
    let binauralGain  = null, binauralMerger = null;
    let pianoInterval = null;
    let chordIndex    = 0;
    let activePianoNodes = [];

    let isRunning     = false;
    let totalSec      = 5 * 60;
    let remainSec     = 5 * 60;
    let timerInterval = null;

    // ── DOM ───────────────────────────────────────────
    const timerEl      = document.getElementById('timerDisplay');
    const statusEl     = document.getElementById('statusText');
    const startBtn     = document.getElementById('startBtn');
    const stopBtn      = document.getElementById('stopBtn');
    const freqBars     = document.getElementById('freqBars');
    const progressFill = document.getElementById('progressFill');
    const progressPct  = document.getElementById('progressPct');
    const timeSelect   = document.getElementById('timeSelect');
    const pianoVolSlider = document.getElementById('pianoVolSlider');
    const binauralVolSlider = document.getElementById('binauralVolSlider');
    const pianoToggle = document.getElementById('pianoToggle');
    const binauralToggle = document.getElementById('binauralToggle');

    function updatePianoVolume() {
        if (mainPianoGain) {
            mainPianoGain.gain.value = pianoToggle.checked ? parseFloat(pianoVolSlider.value) : 0;
        }
        pianoVolSlider.style.opacity = pianoToggle.checked ? '1' : '0.4';
    }

    function updateBinauralVolume() {
        if (mainBinauralGain) {
            mainBinauralGain.gain.value = binauralToggle.checked ? parseFloat(binauralVolSlider.value) : 0;
        }
        binauralVolSlider.style.opacity = binauralToggle.checked ? '1' : '0.4';
    }

    pianoVolSlider.addEventListener('input', updatePianoVolume);
    binauralVolSlider.addEventListener('input', updateBinauralVolume);
    pianoToggle.addEventListener('change', updatePianoVolume);
    binauralToggle.addEventListener('change', updateBinauralVolume);

    // ── 이중 클릭 방지 (addClick 패턴) ─────────────────
    function addClick(btn, handler) {
        let busy = false;
        btn.addEventListener('click', () => {
            if (busy) return;
            busy = true;
            handler();
            setTimeout(() => { busy = false; }, 500);
        });
    }

    addClick(startBtn, startSession);
    addClick(stopBtn, stopSession);

    // ── iOS AudioContext 해제 ─────────────────────────
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('click',      unlockAudio, { once: true });

    function unlockAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function getCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainPianoGain = audioCtx.createGain();
            mainBinauralGain = audioCtx.createGain();
            mainPianoGain.connect(audioCtx.destination);
            mainBinauralGain.connect(audioCtx.destination);
            
            if (pianoVolSlider && pianoToggle) {
                mainPianoGain.gain.value = pianoToggle.checked ? parseFloat(pianoVolSlider.value) : 0;
            }
            if (binauralVolSlider && binauralToggle) {
                mainBinauralGain.gain.value = binauralToggle.checked ? parseFloat(binauralVolSlider.value) : 0;
            }
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    // ── 모드 선택 ─────────────────────────────────────
    function setMode(mode, btn) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tagEl = document.getElementById('modeTag');
        if (mode === 'focus') {
            binauralDiff = 14;
            if (tagEl) tagEl.textContent = '바이노럴 비트 14Hz · 피아노 화음으로 SMR(집중) 활성화';
        } else {
            binauralDiff = 10;
            if (tagEl) tagEl.textContent = '바이노럴 비트 10Hz · 피아노 화음으로 알파파(휴식) 활성화';
        }

        if (binauralRight && audioCtx) {
            binauralRight.frequency.setValueAtTime(BINAURAL_LEFT + binauralDiff, audioCtx.currentTime);
        }
    }

    // ── 시간 선택 ─────────────────────────────────────
    function setDuration(min, el) {
        if (isRunning) return;
        totalSec = min * 60;
        remainSec = totalSec;
        updateTimerDisplay(remainSec);
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // ── 바이노럴 비트 시작/종료 ──────────────────────
    function startBinaural() {
        const ctx = getCtx();
        binauralMerger = ctx.createChannelMerger(2);
        binauralGain   = ctx.createGain();

        binauralLeft = ctx.createOscillator();
        const lg = ctx.createGain();
        binauralLeft.type = 'sine';
        binauralLeft.frequency.value = BINAURAL_LEFT;
        lg.gain.value = 1.0;
        binauralLeft.connect(lg);
        lg.connect(binauralMerger, 0, 0);

        binauralRight = ctx.createOscillator();
        const rg = ctx.createGain();
        binauralRight.type = 'sine';
        binauralRight.frequency.value = BINAURAL_LEFT + binauralDiff;
        rg.gain.value = 1.0;
        binauralRight.connect(rg);
        rg.connect(binauralMerger, 0, 1);

        binauralGain.gain.setValueAtTime(0, ctx.currentTime);
        binauralGain.gain.linearRampToValueAtTime(1, ctx.currentTime + 4);
        binauralMerger.connect(binauralGain);
        binauralGain.connect(mainBinauralGain);

        binauralLeft.start();
        binauralRight.start();
    }

    function stopBinaural(instantly) {
        if (!audioCtx || !binauralGain) return;
        const fade = instantly ? 0.1 : 2.5;
        try {
            binauralGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fade);
        } catch(e) {}
        setTimeout(() => {
            try { binauralLeft.stop(); binauralRight.stop(); } catch(e) {}
            binauralLeft = null; binauralRight = null;
            binauralGain = null; binauralMerger = null;
        }, (fade + 0.3) * 1000);
    }

    // ── 피아노 화음 연주 ──────────────────────────────
    function playChord(freqs) {
        const ctx = getCtx();
        const now = ctx.currentTime;
        const masterGain = ctx.createGain();
        masterGain.gain.setValueAtTime(0, now);
        masterGain.gain.linearRampToValueAtTime(1.0, now + 0.04);   // 어택
        masterGain.gain.setValueAtTime(1.0, now + 0.3);
        masterGain.gain.exponentialRampToValueAtTime(0.001, now + CHORD_INTERVAL - 0.1); // 릴리즈
        masterGain.connect(mainPianoGain);

        freqs.forEach(freq => {
            // 기음
            const osc = ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const g = ctx.createGain();
            g.gain.value = 1.0;
            osc.connect(g); g.connect(masterGain);
            osc.start(now); osc.stop(now + CHORD_INTERVAL);

            // 2배음 (부드러운 피아노 느낌)
            const osc2 = ctx.createOscillator();
            osc2.type = 'sine';
            osc2.frequency.value = freq * 2;
            const g2 = ctx.createGain();
            g2.gain.value = 0.25;
            osc2.connect(g2); g2.connect(masterGain);
            osc2.start(now); osc2.stop(now + CHORD_INTERVAL);
        });
    }

    function startPiano() {
        chordIndex = 0;
        playChord(PIANO_CHORDS[chordIndex]);
        pianoInterval = setInterval(() => {
            chordIndex = (chordIndex + 1) % PIANO_CHORDS.length;
            playChord(PIANO_CHORDS[chordIndex]);
        }, CHORD_INTERVAL * 1000);
    }

    function stopPiano() {
        clearInterval(pianoInterval);
        pianoInterval = null;
    }

    // ── 완료 멜로디 ───────────────────────────────────
    function playFinishMelody() {
        const ctx = getCtx();
        FINISH_NOTES.forEach((freq, i) => {
            const t = ctx.currentTime + i * 0.22;
            const osc = ctx.createOscillator();
            const g   = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0.18, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(t); osc.stop(t + 0.55);
        });
    }

    // ── 세션 시작 ─────────────────────────────────────
    function startSession() {
        if (isRunning) return;

        const userNameInput = document.getElementById('userNameInput');
        const userName = userNameInput ? userNameInput.value.trim() || '게스트' : '게스트';
        let records = JSON.parse(localStorage.getItem('pianoFocusRecords')) || [];
        const uniqueUsers = [...new Set(records.map(r => r.name || '게스트'))];
        
        if (!uniqueUsers.includes(userName) && uniqueUsers.length >= 100) {
            alert('사용자 등록은 최대 100명까지만 가능합니다. 기존 사용자를 선택하거나 불필요한 기록을 지워주세요.');
            return;
        }

        isRunning = true;
        remainSec = totalSec;

        startBtn.style.display = 'none';
        stopBtn.style.display  = 'block';
        timeSelect.querySelectorAll('.time-btn').forEach(b => b.disabled = true);

        freqBars.classList.remove('paused');
        document.body.classList.add('running');
        statusEl.textContent = '피아노 소리에 집중하세요… 마음을 편안하게 놓아두세요 🎹';

        startBinaural();
        startPiano();
        updateTimerDisplay(remainSec);
        updateProgress();

        timerInterval = setInterval(() => {
            remainSec--;
            updateTimerDisplay(remainSec);
            updateProgress();
            if (remainSec <= 0) finishSession();
        }, 1000);
    }

    // ── 세션 중단 ─────────────────────────────────────
    function stopSession() {
        clearInterval(timerInterval);
        isRunning = false;

        stopBinaural(true);
        stopPiano();

        freqBars.classList.add('paused');
        document.body.classList.remove('running');

        startBtn.style.display = 'block';
        stopBtn.style.display  = 'none';
        timeSelect.querySelectorAll('.time-btn').forEach(b => b.disabled = false);

        remainSec = totalSec;
        updateTimerDisplay(remainSec);
        progressFill.style.width = '0%';
        progressPct.textContent  = '0%';
        statusEl.textContent = '피아노 소리에 집중하며 훈련을 시작해 보세요';
    }

    // ── 세션 완료 ─────────────────────────────────────
    function finishSession() {
        clearInterval(timerInterval);
        isRunning = false;

        stopBinaural(false);
        stopPiano();
        playFinishMelody();

        freqBars.classList.add('paused');
        document.body.classList.remove('running');

        const currentMode = binauralDiff === 14 ? 'focus' : 'relax';
        saveRecord(totalSec / 60, currentMode);

        progressFill.style.width = '100%';
        progressPct.textContent  = '100%';
        statusEl.textContent = '훈련 완료! 정말 잘 하셨어요 🎉🎹';

        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance('피아노 집중력 훈련이 완료되었습니다. 정말 잘 하셨습니다!');
            utt.lang = 'ko-KR'; utt.rate = 0.88;
            setTimeout(() => window.speechSynthesis.speak(utt), 2200);
        }

        setTimeout(() => {
            startBtn.style.display = 'block';
            stopBtn.style.display  = 'none';
            timeSelect.querySelectorAll('.time-btn').forEach(b => b.disabled = false);
            remainSec = totalSec;
            updateTimerDisplay(remainSec);
            progressFill.style.width = '0%';
            progressPct.textContent  = '0%';
            statusEl.textContent = '피아노 소리에 집중하며 훈련을 시작해 보세요';
        }, 5000);
    }

    // ── 디스플레이 업데이트 ──────────────────────────
    function updateTimerDisplay(sec) {
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
        if (sec <= 60 && isRunning) {
            timerEl.style.color = '#f9a8d4';
            if (sec === 60) statusEl.textContent = '거의 다 왔어요! 마지막까지 집중해봐요 🎵';
        } else {
            timerEl.style.color = '#e8d8ff';
        }
    }

    function updateProgress() {
        const pct = Math.round(((totalSec - remainSec) / totalSec) * 100);
        progressFill.style.width = pct + '%';
        progressPct.textContent  = pct + '%';
    }

    // ── 기록 관리 ──────────────────────────────────────
    function saveRecord(min, mode) {
        const today = new Date().toLocaleDateString();
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const userNameInput = document.getElementById('userNameInput');
        const userName = userNameInput ? userNameInput.value.trim() || '게스트' : '게스트';
        
        const newRecord = { name: userName, date: today, time: time, duration: min, mode: mode };

        let records = JSON.parse(localStorage.getItem('pianoFocusRecords')) || [];
        records.push(newRecord);
        localStorage.setItem('pianoFocusRecords', JSON.stringify(records));
        localStorage.setItem('pianoLastUser', userName);
        loadRecords();
    }

    function loadRecords() {
        const today = new Date().toLocaleDateString();
        let records = JSON.parse(localStorage.getItem('pianoFocusRecords')) || [];
        
        const userNameInput = document.getElementById('userNameInput');
        const userName = userNameInput ? userNameInput.value.trim() || '게스트' : '게스트';
        
        // 해당 사용자의 오늘 기록 필터링
        const userTodayRecords = records.filter(r => r.date === today && (r.name || '게스트') === userName);

        const recordWrap = document.getElementById('recordWrap');
        const recordList = document.getElementById('recordList');
        const totalFocusEl = document.getElementById('totalFocusTime');
        const totalRelaxEl = document.getElementById('totalRelaxTime');
        const recordTitle = document.querySelector('.record-title');

        if (recordTitle) {
            recordTitle.textContent = `${userName}님의 훈련 기록 📊`;
        }

        if (userTodayRecords.length > 0) {
            if (recordWrap) recordWrap.style.display = 'block';
            
            let focusSum = 0, relaxSum = 0;
            if (recordList) {
                recordList.innerHTML = '';
                [...userTodayRecords].reverse().forEach(r => {
                    if (r.mode === 'focus') focusSum += r.duration;
                    else relaxSum += r.duration;

                    const li = document.createElement('li');
                    const modeText = r.mode === 'focus' ? '집중' : '휴식';
                    li.innerHTML = `<span>${r.time} - ${modeText}</span><span>${r.duration}분</span>`;
                    recordList.appendChild(li);
                });
            }
            if (totalFocusEl) totalFocusEl.textContent = focusSum;
            if (totalRelaxEl) totalRelaxEl.textContent = relaxSum;
        } else {
            if (recordWrap) recordWrap.style.display = 'none';
        }

        populateUserList(records);
    }

    function populateUserList(records) {
        const dataList = document.getElementById('userList');
        if (!dataList) return;
        
        const uniqueUsers = [...new Set(records.map(r => r.name || '게스트'))];
        dataList.innerHTML = '';
        uniqueUsers.forEach(user => {
            if (user !== '게스트') {
                const option = document.createElement('option');
                option.value = user;
                dataList.appendChild(option);
            }
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        const userNameInput = document.getElementById('userNameInput');
        
        if (userNameInput) {
            userNameInput.addEventListener('input', loadRecords);
            
            // 클릭 시 기존 이름을 비워주어 전체 사용자 목록(드롭다운)이 쉽게 보이도록 함
            userNameInput.addEventListener('click', function() {
                if (this.value !== '') {
                    this.value = '';
                    loadRecords();
                }
            });
        }
        
        loadRecords();
    });
</script>


</body></html>
